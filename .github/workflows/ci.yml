name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '18'

      - name: Install backend dependencies
        working-directory: ./tienda-tech-backend
        run: npm install

      - name: Run unit tests
        working-directory: ./tienda-tech-backend
        run: npm test

  publish:
    name: Build & Publish Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        run: |
          docker build -t ghcr.io/${{ env.OWNER_LC }}/tienda-tech-backend:latest ./tienda-tech-backend
          docker push ghcr.io/${{ env.OWNER_LC }}/tienda-tech-backend:latest

      - name: Build and push frontend
        run: |
          docker build -t ghcr.io/${{ env.OWNER_LC }}/tienda-tech-frontend:latest ./tienda-tech-frontend
          docker push ghcr.io/${{ env.OWNER_LC }}/tienda-tech-frontend:latest

      - name: Build and push database
        run: |
          docker build -t ghcr.io/${{ env.OWNER_LC }}/tienda-tech-db:latest ./tienda-tech-db
          docker push ghcr.io/${{ env.OWNER_LC }}/tienda-tech-db:latest

  deploy:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and deploy with Docker Compose
        run: |
          docker compose pull
          docker compose up -d
          echo "Waiting for services to be ready..."
          sleep 30

      - name: Verify deployment
        run: |
          docker compose ps
          echo "--- Backend health check ---"
          curl -f http://localhost:3001/api/health || exit 1
          echo ""
          echo "--- Frontend check ---"
          curl -f http://localhost:8080 || exit 1
          echo ""
          echo "Deployment verified successfully"

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Cleanup
        if: always()
        run: docker compose down -v
